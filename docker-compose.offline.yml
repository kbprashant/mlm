version: "2.1"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: always
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"

  influxdb:
    image: influxdb:1.8
    restart: always
    volumes:
      - influxdb_data:/var/lib/influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: telegraf
      INFLUXDB_ADMIN_ENABLED: "true"
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD-changethispassword}
      INFLUXDB_HTTP_AUTH_ENABLED: "false"

  telegraf:
    image: telegraf:1.29
    restart: always
    hostname: irrigation
    depends_on:
      - influxdb
      - mosquitto
    volumes:
      - ./telegraf-esp32.conf:/etc/telegraf/telegraf.conf:ro

  grafana:
    image: grafana/grafana:10.2.0
    restart: always
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD-admin}

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: irrigation
      POSTGRES_USER: irrigation_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD-changethispassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irrigation_user -d irrigation"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: mlm-backend:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_started
      mosquitto:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://irrigation_user:${POSTGRES_PASSWORD-changethispassword}@postgres:5432/irrigation
      INFLUX_HOST: influxdb
      INFLUX_PORT: "8086"
      INFLUX_DATABASE: telegraf
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    ports:
      - "3001:3001"

  frontend:
    image: mlm-frontend:latest
    restart: always
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data:
  postgres_data:
