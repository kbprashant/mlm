# ============================================================
# Telegraf configuration for ESP32 Irrigation Monitoring
# Replaces (or appends to) your existing telegraf.conf
# ============================================================

[global_tags]
  project = "irrigation"

[agent]
  interval = "1s"          # Match ESP32 1-second data rate
  round_interval = false
  metric_buffer_limit = 20000
  flush_buffer_when_full = true
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  debug = false
  quiet = false
  hostname = "irrigation"

###############################################################################
#                                OUTPUTS                                      #
###############################################################################

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "telegraf"
  precision = "s"
  timeout = "5s"

###############################################################################
#                                INPUTS                                       #
###############################################################################

# ------------------------------------------------------------------
# ESP32 irrigation sensors  –  NEW
# Topic:   devices/{device_id}/data
# Payload: {"device_id":"WS_001","timestamp":"2026-03-11T10:15:22",
#            "weight":1250.45,"irrigation_status":"ON"}
# ------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers               = ["tcp://mosquitto:1883"]
  name_override         = "irrigation_readings"
  qos                   = 1
  topics                = ["devices/+/data"]
  persistent_session    = true
  client_id             = "telegraf-irrigation"

  data_format           = "json"
  tag_keys              = ["device_id"]
  json_string_fields    = ["irrigation_status"]
  json_time_key         = "timestamp"
  json_time_format      = "2006-01-02T15:04:05"

# ------------------------------------------------------------------
# Legacy MLM sensors (keep existing pipeline intact)
# ------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers            = ["tcp://mosquitto:1883"]
  name_override      = "mlm_reading"
  qos                = 1
  topics             = ["disabled/#"]
  persistent_session = true
  client_id          = "telegraf-root"
  data_format        = "value"
  data_type          = "float"

[[inputs.mqtt_consumer]]
  servers            = ["tcp://mosquitto:1883"]
  qos                = 1
  topics             = ["idb/#"]
  persistent_session = true
  client_id          = "telegraf-idb"
  data_format        = "influx"

###############################################################################
# Example InfluxQL queries for the irrigation_readings measurement:
#
#   SELECT weight, irrigation_status
#   FROM irrigation_readings
#   WHERE device_id = 'WS_001' AND time > now() - 10m
#   ORDER BY time ASC
#
#   SELECT MEAN(weight)
#   FROM irrigation_readings
#   WHERE time > now() - 1h
#   GROUP BY time(1m), device_id
###############################################################################
